name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: inventory
          POSTGRES_PASSWORD: inventory
          POSTGRES_DB: inventory_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://inventory:inventory@localhost:5432/inventory_agent
      ENVIRONMENT: testing
      ALLOW_DEMO_KEY: true
      AGENT_API_KEY: demo-key-2024
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: pytest tests/ -v
      - name: Run eval suite
        run: python -m pytest tests/eval_suite.py -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        run: |
          cd inventory-frontend
          npm ci
      - name: Build frontend
        run: |
          cd inventory-frontend
          npm run build
